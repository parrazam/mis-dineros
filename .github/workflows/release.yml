name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > keystore/release.jks

      - name: Build release APK + AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Rename artifacts
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/mis-dineros-${{ github.ref_name }}.aab

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          echo "Using apksigner from $APKSIGNER"
          "$APKSIGNER" verify --print-certs \
            app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: "Mis Dineros ${{ github.ref_name }}"
          generate_notes: true
          files: |
            app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/mis-dineros-${{ github.ref_name }}.aab

      - name: Clean up keystore
        if: always()
        run: rm -f keystore/release.jks

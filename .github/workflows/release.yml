name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > keystore/release.jks

      - name: Build release APK + AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Rename artifacts
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/mis-dineros-${{ github.ref_name }}.aab

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner"
          echo "Using apksigner from $APKSIGNER"
          "$APKSIGNER" verify --print-certs \
            app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: "Mis Dineros ${{ github.ref_name }}"
          generate_notes: true
          files: |
            app/build/outputs/apk/release/mis-dineros-${{ github.ref_name }}.apk
            app/build/outputs/bundle/release/mis-dineros-${{ github.ref_name }}.aab

      - name: Clean up keystore
        if: always()
        run: rm -f keystore/release.jks
